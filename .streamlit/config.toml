[theme]
base = "dark"
primaryColor = "#D4A853"
backgroundColor = "#0C1214"
secondaryBackgroundColor = "#121B1F"
textColor = "#E6EBE8"

[server]
headless = true
# Mizan Excel dosyaları büyük olabiliyor — varsayılan 200 MB sınırı yetersiz
maxUploadSize = 1000

# viewer: geliştirici menüsü/kısayolları kapalı (C=clear cache vb.) — son kullanıcı modu
[client]
toolbarMode = "viewer"
